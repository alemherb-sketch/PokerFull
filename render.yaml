services:
  - type: web
    name: pokerfull-app
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false

  - type: web
    name: pokerfull-bot
    env: docker
    rootDir: server
    envVars:
      - key: PORT
        value: 3000
